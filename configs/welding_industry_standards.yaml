metadata:
  version: "2026-06-02"
  language: zh-CN
  scope:
    - 工业压力管道焊接 PWPS 参考字段
    - 油气长输/集输管道焊接 PWPS 参考字段
    - ASME/AWS 材料场景兼容参考
  disclaimer: >
    本文件用于管道焊接大模型生成 PWPS 模板字段的参考值，不替代正式标准、
    设计文件、焊接工艺评定 PQR、焊材说明书、项目 WPS 或工程师审核。
    电流、电压、焊接速度、气体流量等字段为参考参数，不是国标强制通用值。

required_input_fields:
  - key: welding_process
    label: 焊接工艺
    type: enum
    options:
      - SMAW
      - GTAW
      - GMAW
      - FCAW
      - SAW
    source_hint: WPS/PQR、工艺卡或施工方案
    examples:
      - SMAW
      - GTAW+SMAW
    role: user_constraint
    basis: user_input_required
    used_for:
      - standard_matching
      - document_generation
      - reask_completion

  - key: welding_object
    label: 焊接对象
    type: enum
    options:
      - 管道
      - 板材
      - 管件
      - 设备
    source_hint: 图纸、工单或检验委托单
    examples:
      - 管道
      - 设备
    role: user_constraint
    basis: user_input_required
    used_for:
      - standard_matching
      - document_generation
      - reask_completion

  - key: joint_type
    label: 接头形式
    type: enum
    options:
      - 对接
      - 角接
      - 搭接
      - 支管连接
    source_hint: 焊接接头详图、坡口图或施工图
    examples:
      - 对接
      - 支管连接
    role: user_constraint
    basis: user_input_required
    used_for:
      - standard_matching
      - document_generation
      - reask_completion

  - key: base_material
    label: 母材牌号/规格
    type: text
    source_hint: 材料数据库、标准材料分组、材质证明书或设计文件
    examples:
      - 20#
      - Q345R
      - ASTM A106 Gr.B / P-No.1
    role: user_constraint
    basis: user_input_required
    used_for:
      - standard_matching
      - document_generation
      - reask_completion

  - key: base_thickness_or_diameter
    label: 母材厚度/管径
    type: text
    source_hint: 图纸、材料清单、标准适用范围
    examples:
      - 壁厚 8 mm，DN100
      - 板厚 12 mm
      - OD 219.1 x 8.2 mm
    role: user_constraint
    basis: user_input_required
    used_for:
      - standard_matching
      - document_generation
      - reask_completion

standard_families:
  industrial_pressure_piping:
    label: 工业压力管道
    applicable_codes:
      - GB/T 20801.4-2020 压力管道规范 工业管道 第4部分：制作与安装
      - GB 50236-2011 现场设备、工业管道焊接工程施工规范
      - GB 50683-2011 现场设备、工业管道焊接工程施工质量验收规范
      - NB/T 47014-2023 承压设备焊接工艺评定
      - GB/T 19869.1-2005 钢、镍及镍合金的焊接工艺评定试验
  oil_gas_pipeline:
    label: 油气长输/集输管道
    applicable_codes:
      - GB/T 9711-2023 石油天然气工业 管线输送系统用钢管
      - GB 50369-2014 油气长输管道工程施工及验收规范
      - GB 50819-2013 油气田集输管道工程施工规范
      - SY/T 4109 钢质管道无损检测
  asme_aws_reference:
    label: ASME/AWS 兼容参考
    applicable_codes:
      - ASME Section IX Welding, Brazing, and Fusing Qualifications
      - ASTM A106/A106M Seamless Carbon Steel Pipe
      - AWS A5.18 Carbon Steel Electrodes and Rods for Gas Shielded Arc Welding
      - AWS A5.1 Carbon Steel Electrodes for Shielded Metal Arc Welding

